name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore
      run: dotnet restore
    - name: Build
      run: dotnet build --configuration Release --no-restore
    - name: Package Plugin
      run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            VERSION="${GITHUB_SHA}"
          fi

          mkdir -p Output/TBAntiCheat/Configs
          cp bin/Release/net8.0/TBAntiCheat.dll Output/TBAntiCheat/

          if [[ -f bin/Release/net8.0/TBAntiCheat.pdb ]]; then
            cp bin/Release/net8.0/TBAntiCheat.pdb Output/TBAntiCheat/
          fi

          cp Config/*.json Output/TBAntiCheat/Configs/
          cp README.md Output/TBAntiCheat/

          if [[ -d docs ]]; then
            cp -R docs Output/TBAntiCheat/
          fi

          tar -czf "Output/TBAntiCheat-${VERSION}.tar.gz" -C Output TBAntiCheat
    - name: Publish Artifact
      uses: actions/upload-artifact@v4
      with:
          name: TBAntiCheat-output
          path: Output

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Download packaged artifact
      uses: actions/download-artifact@v4
      with:
        name: TBAntiCheat-output
        path: Output
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}
    - name: Build release manifest
      run: |
          cat <<EOF > Output/manifest.json
          {
            "plugin": "TBAntiCheat",
            "version": "${GITHUB_REF_NAME}",
            "archive": "TBAntiCheat-${GITHUB_REF_NAME}.tar.gz",
            "s3Prefix": "cs2-anticheat/releases/${GITHUB_REF_NAME}/"
          }
          EOF
    - name: Upload release archive to S3
      run: |
          aws s3 cp "Output/TBAntiCheat-${GITHUB_REF_NAME}.tar.gz" "s3://${{ secrets.TBAC_S3_BUCKET }}/cs2-anticheat/releases/${GITHUB_REF_NAME}/TBAntiCheat-${GITHUB_REF_NAME}.tar.gz"
          aws s3 cp "Output/manifest.json" "s3://${{ secrets.TBAC_S3_BUCKET }}/cs2-anticheat/releases/${GITHUB_REF_NAME}/manifest.json"
    - name: Update latest manifest
      run: |
          cat <<EOF > Output/latest.json
          {
            "plugin": "TBAntiCheat",
            "latestVersion": "${GITHUB_REF_NAME}",
            "archive": "s3://${{ secrets.TBAC_S3_BUCKET }}/cs2-anticheat/releases/${GITHUB_REF_NAME}/TBAntiCheat-${GITHUB_REF_NAME}.tar.gz"
          }
          EOF

          aws s3 cp "Output/latest.json" "s3://${{ secrets.TBAC_S3_BUCKET }}/cs2-anticheat/releases/latest.json"
